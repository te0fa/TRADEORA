name: TRADEORA Weekly Backtest
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python backtest_signals.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYTHONPATH: ${{ github.workspace }}

      - name: Retrain AI Models
        run: python train_model.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Commit updated models
        run: |
          git config user.name "TRADEORA Bot"
          git config user.email "bot@tradeora.ai"
          git add models/
          git commit -m "chore: weekly model retrain $(date +%Y-%m-%d)" || true
          git push origin main
