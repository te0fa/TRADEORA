name: TRADEORA Weekly Backtest, Retrain & Recommendations Pipeline

on:
  schedule:
    # Runs every Sunday at 03:00 AM UTC (06:00 AM Cairo Time) before market open
    - cron: '0 3 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-pipeline
  cancel-in-progress: true

jobs:
  weekly-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1. Sync Fundamentals & Fair Value
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python services/fundamentals_importer.py

      - name: 2. Run Historical Backtest & Signal Stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python backtest_signals.py

      - name: 3. Retrain AI Models with Latest Technical & Fundamental Features
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python train_model.py

      - name: 4. Generate Fresh Trade Recommendations
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python generate_daily_recommendations.py

      - name: 5. Run Performance Analytics Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python performance_analytics.py

      - name: 6. Commit Retrained AI Models & Artifacts
        run: |
          git config user.name "TRADEORA Bot"
          git config user.email "bot@tradeora.ai"
          git add models/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: weekly AI model retrain & backtest pipeline $(date +%Y-%m-%d)"
            git pull origin main --rebase
            git push origin main
          fi
