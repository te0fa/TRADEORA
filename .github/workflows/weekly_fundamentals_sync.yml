name: Weekly Fundamentals & Fair Value Sync

on:
  schedule:
    # Runs every Sunday at 06:00 AM UTC (09:00 AM Cairo Time) before market open
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync-fundamentals:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unified Fundamentals & Fair Value Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python services/fundamentals_importer.py
