name: Intraday EGX Price Ingestion & Consensus

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Type of run: full, light, or dynamic'
        required: false
        default: 'dynamic'

concurrency:
  group: intraday-ingestion
  cancel-in-progress: true

jobs:
  ingest-intraday-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium

    - name: Run Intraday Consensus Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # bypass_session_guard is False by default for production safety
        python services/intraday_importer.py --run-type ${{ github.event.inputs.run_type || 'dynamic' }}

    - name: Prune Old Intraday Snapshots (Older than 90 days)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python -c "
        import os, time
        from supabase import create_client
        from datetime import datetime, timezone, timedelta
        sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
        cutoff = (datetime.now(timezone.utc) - timedelta(days=90)).isoformat()
        print('Pruning snapshot times before:', cutoff)
        
        # We delete using company-by-company logic or query batches to prevent postgrest JSON buffer limits and timeouts
        res_comp = sb.table('companies').select('id').execute()
        companies = res_comp.data if res_comp.data else []
        
        total_deleted = 0
        for co in companies:
            cid = co['id']
            del_res = sb.table('intraday_snapshots').delete().eq('company_id', cid).lt('snapshot_time', cutoff).execute()
            deleted = len(del_res.data) if del_res.data else 0
            total_deleted += deleted
            if deleted > 0:
                time.sleep(0.05)
        print(f'Pruning job completed successfully. Total deleted: {total_deleted}')
        "
