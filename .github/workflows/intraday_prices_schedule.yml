name: Intraday EGX Price Ingestion & Consensus

on:
  schedule:
    # Runs every 15 minutes between 6:00 AM and 11:59 AM UTC (9:00 AM - 2:59 PM Cairo Time), Sunday to Thursday
    - cron: '*/15 6-11 * * 0-4'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  ingest-intraday-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        playwright install chromium

    - name: Run Intraday Consensus Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # bypass_session_guard is False by default for production safety
        python services/intraday_importer.py
