name: Intraday EGX Price Ingestion & Consensus

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Type of run: full, light, or dynamic'
        required: false
        default: 'dynamic'

jobs:
  ingest-intraday-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium

    - name: Run Intraday Consensus Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # bypass_session_guard is False by default for production safety
        python services/intraday_importer.py --run-type ${{ github.event.inputs.run_type || 'dynamic' }}
