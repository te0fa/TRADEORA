name: Intraday EGX Price Ingestion & Consensus

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Type of run: full, light, or dynamic'
        required: false
        default: 'dynamic'

concurrency:
  group: intraday-ingestion
  cancel-in-progress: true

jobs:
  ingest-intraday-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium

    - name: Run Intraday Consensus Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # bypass_session_guard is False by default for production safety
        python services/intraday_importer.py --run-type ${{ github.event.inputs.run_type || 'dynamic' }}

    - name: Prune Old Intraday Snapshots (Older than 7 days)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python -c "
        import os
        from supabase import create_client
        from datetime import datetime, timezone, timedelta
        sb = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
        cutoff = (datetime.now(timezone.utc) - timedelta(days=7)).isoformat()
        print('Pruning records created before:', cutoff)
        
        # We perform deleting in chunks to prevent database transaction timeout locks
        has_more = True
        total_deleted = 0
        while has_more:
            res = sb.table('intraday_snapshots').delete().lt('created_at', cutoff).limit(5000).execute()
            deleted = len(res.data) if res.data else 0
            total_deleted += deleted
            print(f'Deleted {deleted} rows. Total so far: {total_deleted}')
            if deleted < 5000:
                has_more = False
        print('Pruning job completed successfully.')
        "
