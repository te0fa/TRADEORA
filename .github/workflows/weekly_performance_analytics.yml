name: Tradeora Weekly Performance Analytics

on:
  schedule:
    # Run every Friday at 4:00 PM UTC (6:00 PM Cairo time - after EGX weekly session closes)
    - cron: '0 16 * * 5'
  workflow_dispatch:

concurrency:
  group: performance-analytics
  cancel-in-progress: true

jobs:
  analyze-performance:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scipy requests supabase python-dotenv

    - name: Run Analytics Engine
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python performance_analytics.py
