name: Tradeora Real-time Active Trades Tracking

on:
  schedule:
    # Run every 15 minutes during EGX trading hours (Sunday to Thursday, 8 AM - 3 PM UTC / 10 AM - 5 PM Cairo Time)
    - cron: '*/15 8-15 * * 0-4'
  workflow_dispatch:

concurrency:
  group: trade-tracking
  cancel-in-progress: true

jobs:
  track-trades:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Active Trades Monitor Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://tradeora-web.vercel.app' }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python track_trades.py
