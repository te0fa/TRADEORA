name: Daily EGX Price Update (TradingView)

on:
  schedule:
    # Runs at 15:00 UTC (6:00 PM Cairo Time / GMT+3) every Sunday to Thursday
    - cron: '0 15 * * 0-4'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI for testing

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run EOD Price Importer
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python main.py --source tradingview
