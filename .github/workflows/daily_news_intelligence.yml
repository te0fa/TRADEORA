name: TRADEORA Daily News & Macro Intelligence Pipeline

on:
  schedule:
    # Runs twice daily (04:00 UTC and 14:00 UTC -> 07:00 AM and 05:00 PM Cairo Time)
    - cron: '0 4,14 * * *'
  workflow_dispatch:

concurrency:
  group: news-intelligence-pipeline
  cancel-in-progress: true

jobs:
  news-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch & Analyze AI News & Geopolitical Intelligence
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python services/news_intelligence_service.py
